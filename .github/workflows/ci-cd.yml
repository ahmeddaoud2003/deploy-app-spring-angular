name: CI/CD Pipeline

# 1. Déclencheur sur la branche main
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 2. Récupération du code
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: ☕ Installation de Java 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: 🔨 Compilation du code Java
        run: mvn -B package --file springboot/app/pom.xml -DskipTests
	
# 3a. Se connecter à Docker Hub avec les secrets
      - name: Se connecter à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3b. Builder et Pousser l'image du backend
      - name: Build et push Backend
        run: |
          docker build -t spring-app -t ${{ secrets.DOCKERHUB_USERNAME }}/spring-app:latest ./springboot/app
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/spring-app:latest

      # 3c. Builder et Pousser l'image du frontend
      - name: Build et push Frontend
        run: |
          docker build -t angular-app -t ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest ./angular-app
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest
# Lancer le docker-compose
      - name: Lancer l'application localement dans le runner
        run: docker-compose up -d

      # Vérifier que les conteneurs démarrent correctement
      - name: Vérifier les conteneurs
        run: docker ps
